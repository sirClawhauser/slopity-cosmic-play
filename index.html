<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Slopity">
<meta name="theme-color" content="#070910">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>Slopity Cosmic · three.js WebGPU</title>
<style>
  :root {
    --panel: rgba(10, 13, 22, 0.55);
    --border: rgba(255, 255, 255, 0.09);
    --text: #e8ecf6;
    --dim: #96a0b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; overflow: hidden; background: #070910;
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }
  button { touch-action: manipulation; }
  body { font-family: ui-rounded, -apple-system, "SF Pro Rounded", "Segoe UI", system-ui, sans-serif; color: var(--text); }
  #app, #app canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

  .panel {
    position: fixed; z-index: 10;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  #info {
    top: calc(18px + env(safe-area-inset-top));
    left: calc(18px + env(safe-area-inset-left));
    padding: 13px 17px; max-width: 330px;
  }
  #info h1 { font-size: 19px; font-weight: 700; margin: 0; }
  #info h1 span { opacity: 0.55; font-weight: 500; }
  #info p { margin: 6px 0 0; font-size: 12.5px; line-height: 1.5; color: var(--dim); }
  #info b { color: var(--text); font-weight: 600; }
  #seed { margin-top: 3px; font-size: 11px; color: var(--dim); opacity: 0.7; }

  #bar {
    bottom: calc(20px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; padding: 8px;
    flex-wrap: wrap; justify-content: center;
    max-width: calc(100vw - 20px);
  }
  #bar button {
    font: inherit; font-size: 13.5px; font-weight: 600;
    color: var(--text);
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid transparent;
    border-radius: 10px;
    padding: 9px 16px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  #bar button:hover { background: rgba(255, 255, 255, 0.13); }
  #bar button:active { transform: scale(0.96); }
  #bar button:focus-visible { outline: 2px solid rgba(120, 160, 255, 0.8); outline-offset: 2px; }

  #badge {
    bottom: calc(20px + env(safe-area-inset-bottom)); right: calc(18px + env(safe-area-inset-right));
    padding: 8px 14px;
    font-size: 12px; color: var(--dim);
    display: flex; gap: 10px; align-items: center;
    font-variant-numeric: tabular-nums;
  }
  #badge b { color: var(--text); font-weight: 600; }
  #badge.gpu #backend { color: #7dffb0; }
  #badge.gl #backend { color: #ffd57d; }

  #win {
    top: 40%; left: 50%;
    transform: translate(-50%, -50%) scale(0.7);
    padding: 24px 52px;
    font-size: 34px; font-weight: 700;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow: 0 0 24px rgba(127, 216, 176, 0.6);
  }
  #win.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

  @media (max-width: 640px) {
    #info { max-width: calc(100vw - 36px); }
    #info p .desktop-hint { display: none; }
    #badge { display: none; }
  }
</style>
</head>
<body>
<div id="app"></div>

<div id="errlog" style="position:fixed;left:0;right:0;top:0;z-index:99;font:11px ui-monospace,monospace;color:#ffd9a0;background:rgba(70,10,10,0.9);padding:8px 12px;display:none;white-space:pre-wrap;word-break:break-all;max-height:45vh;overflow:auto"></div>
<script>
(function () {
  function beacon(m) {
    try { fetch('http://localhost:8787/log?m=' + encodeURIComponent(m)).catch(function () {}) } catch (e) {}
  }
  function show(msg) {
    beacon(msg)
    var el = document.getElementById('errlog')
    if (!el) return
    el.style.display = 'block'
    el.textContent += msg + '\n'
  }
  beacon('open gpu=' + !!navigator.gpu + ' ua=' + navigator.userAgent)
  setTimeout(function () {
    var b = document.getElementById('backend')
    var f = document.getElementById('fps')
    beacon('after8s backend=' + (b && b.textContent) + ' fps=' + (f && f.textContent))
  }, 8000)
  addEventListener('error', function (e) {
    show('[error] ' + (e.message || e.type) + ' @' + String(e.filename || '').split('/').pop() + ':' + e.lineno)
  })
  addEventListener('unhandledrejection', function (e) {
    var r = e.reason
    show('[promise] ' + (r && (r.stack || r.message) || r))
  })
  window.__showerr = show
})()
</script>

<div id="info" class="panel">
  <h1>Slopity&nbsp;Cosmic <span>· three.js r185</span></h1>
  <p>
    <b>Тяни фигуру</b> на подиум — магнитный снап<br>
    <b>Тап</b> — поворот на 90° вокруг якоря
  </p>
  <div id="seed"></div>
</div>

<div id="bar" class="panel">
  <button id="btn-retry">↩ Заново</button>
  <button id="btn-new">✨ Новая доска</button>
</div>

<div id="badge" class="panel">
  <span><b id="backend">…</b></span>
  <span><b id="fps">–</b> fps</span>
</div>

<div id="win" class="panel">Собрано! ✨</div>

<script src="dist/app.js"></script>
<script>
  if ('serviceWorker' in navigator && location.protocol === 'https:') {
    navigator.serviceWorker.register('sw.js')
  }
</script>
</body>
</html>
